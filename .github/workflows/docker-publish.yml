name: docker-build

on:
  push:
    branches:
      - main

jobs:
  multi-arch-push:
    runs-on: ubuntu-latest
    steps:
      - name: Free space on runner
        run: |
          sudo rm -rf /usr/local/lib/android
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - 
        name: Login to GitHub Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}
      -
         name: Get Latest Tag
         id: previoustag
         uses: WyriHaximus/github-action-get-previous-tag@61819f33034117e6c686e6a31dba995a85afc9de # v2
      -
        name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/s390x,linux/ppc64le,linux/riscv64
          push: true
          tags: |
            ghcr.io/erisa/ts-derper:latest
            ghcr.io/erisa/ts-derper:${{ steps.previoustag.outputs.tag }}
          cache-from: type=gha,mode=max
          cache-to: type=gha,mode=max
